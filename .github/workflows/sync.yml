name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # every day
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # Step 1: run a standard checkout action
      - name: Checkout target repo
        uses: actions/checkout@v3

      # Step 2: validate the PAT used for sync
      - name: Validate sync PAT
        env:
          UPSTREAM_SYNC_PAT: ${{ secrets.UPSTREAM_SYNC_PAT }}
        run: |
          if [ -z "${UPSTREAM_SYNC_PAT}" ]; then
            echo "::error::Missing secret UPSTREAM_SYNC_PAT."
            echo "::error::Create a PAT with repo + workflow scopes, then add it in repository secrets."
            exit 1
          fi

      # Step 3: run the sync action
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: cf-pages/Telegraph-Image
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.UPSTREAM_SYNC_PAT }} # PAT with repo + workflow scopes

          # Set test_mode true to run tests instead of the true action!!
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 常见原因：UPSTREAM_SYNC_PAT 缺失、权限不足，或目标分支存在保护规则。"
          echo "[Error] 如果上游本次变更包含 .github/workflows/*，PAT 还需要 workflow 权限。"
          echo "[Error] Due to missing PAT, insufficient PAT scopes, branch protection rules, or upstream workflow changes, the sync push was rejected."
          exit 1
